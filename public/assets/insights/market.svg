<svg viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Editorial mark for the market piece — a rising trend over a calm horizon." preserveAspectRatio="xMidYMid slice">
  <rect width="1600" height="900" fill="#d8ccc0"/>

  <!-- Vertical axis ticks (mono feel) -->
  <g stroke="#564c44" stroke-width="1.5" opacity="0.55" stroke-linecap="round">
    <line x1="220" y1="240" x2="220" y2="680"/>
    <line x1="200" y1="240" x2="240" y2="240"/>
    <line x1="200" y1="320" x2="230" y2="320"/>
    <line x1="200" y1="400" x2="240" y2="400"/>
    <line x1="200" y1="480" x2="230" y2="480"/>
    <line x1="200" y1="560" x2="240" y2="560"/>
    <line x1="200" y1="640" x2="230" y2="640"/>
  </g>

  <!-- Calm horizon baseline -->
  <line x1="220" y1="700" x2="1380" y2="700" stroke="#564c44" stroke-width="1.5" opacity="0.55"/>

  <!-- Earlier-year trend lines (faded, layered) -->
  <g fill="none" stroke="#564c44" stroke-width="2" opacity="0.28">
    <path d="M 280 640 Q 620 580 1000 530 T 1320 460"/>
    <path d="M 280 615 Q 620 555 1000 490 T 1320 420"/>
  </g>

  <!-- The 2026 trend — bolder rising curve -->
  <path d="M 280 580 Q 620 470 1000 360 T 1320 260"
        fill="none" stroke="#1a120c" stroke-width="3" opacity="0.7" stroke-linecap="round"/>

  <!-- Tick markers along the curve -->
  <g fill="#1a120c" opacity="0.65">
    <circle cx="280" cy="580" r="6"/>
    <circle cx="540" cy="510" r="6"/>
    <circle cx="820" cy="420" r="6"/>
    <circle cx="1090" cy="340" r="6"/>
  </g>

  <!-- Ember "current" peak point -->
  <circle cx="1320" cy="260" r="50" fill="none" stroke="#9d4d2a" stroke-width="1.5" opacity="0.45"/>
  <circle cx="1320" cy="260" r="22" fill="#9d4d2a"/>

  <!-- Bottom caption tick -->
  <g stroke="#564c44" stroke-width="1.5" opacity="0.6">
    <line x1="220" y1="800" x2="320" y2="800"/>
  </g>
</svg>
